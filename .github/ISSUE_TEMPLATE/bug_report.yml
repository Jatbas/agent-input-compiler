name: Bug Report
description: Report a bug in AIC
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: AIC version
      description: Run `npx @jatbas/aic status` or check `mcp/package.json`
      placeholder: "0.10.2"
    validations:
      required: true

  - type: dropdown
    id: editor
    attributes:
      label: Editor
      options:
        - Cursor
        - Claude Code (CLI)
        - Claude Code (VS Code extension)
        - Claude Code (Cursor extension)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include what you expected vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Open a project in Cursor
        2. Send a message
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages, MCP output, or hook logs.
      render: text

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.x"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
