name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the feature and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What workflow does it improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches? What are their trade-offs?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core pipeline (compilation, selection, guard)
        - Cursor integration
        - Claude Code integration
        - New editor integration
        - CLI / diagnostics
        - Configuration
        - Documentation
        - Other
    validations:
      required: true
