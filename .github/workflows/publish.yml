name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    name: publish-npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Ensure npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Pack and publish @jatbas/aic-shared
        run: |
          pnpm pack
          npm publish *.tgz --access public
        working-directory: shared

      - name: Pack and publish @jatbas/aic-mcp
        run: |
          pnpm pack
          npm publish *.tgz --access public
        working-directory: mcp
